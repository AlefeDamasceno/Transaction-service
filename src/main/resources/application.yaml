spring:
  application:
    name: transaction-service

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

      bindings:
        approved-out:
          destination: transactions-approved
          content-type: application/json
          producer:
            configuration:
              acks: all
              retries: 1

        rejected-out:
          destination: transactions-rejected
          content-type: application/json
          producer:
            configuration:
              acks: all
              retries: 1

      function:
        definition: approved;rejected

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.cloud.stream: DEBUG