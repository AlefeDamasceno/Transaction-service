spring:
  application:
    name: transaction-service

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:transactionDb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true

      bindings:
        approved-out:
          destination: transactions-approved
          content-type: application/json
          producer:
            configuration:
              acks: all
              retries: 1

        rejected-out:
          destination: transactions-rejected
          content-type: application/json
          producer:
            configuration:
              acks: all
              retries: 1

        accountEventConsumer-in-0:
          destination: account-created
          group: account-created-group

      function:
        definition: approved;rejected;accountEventConsumer

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.cloud.stream: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false